# fly.toml app configuration file generated for domi-obstruction on 2026-02-15T10:57:52-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'domi-obstruction'
primary_region = 'iad'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
  
[build]
  dockerfile = "Dockerfile_HTTP"
  context = "."

[[services]]
  internal_port = 8000  # or whatever your MCP server listens on
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]